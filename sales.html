<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Orders & Invoices - ProFix ERP</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Workspace -->
        <div class="main-wrapper">
            <!-- Topbar placeholder -->
            <div id="topbar-placeholder"></div>

            <!-- Sales Invoices Page -->
            <main class="content-body">
                <div class="page-header">
                    <div class="page-title-group">
                        <h2 class="page-title">Sales Orders & Invoices</h2>
                        <span class="page-subtitle">Draft quotations, record cash flows, and manage orders shipping</span>
                    </div>
                    <div class="page-actions">
                        <button class="btn btn-primary" id="create-invoice-btn">
                            + Create Sales Invoice
                        </button>
                        <button class="btn btn-secondary" onclick="ProFixERP.showToast('Exporting invoices database...', 'info')">
                            Export Excel
                        </button>
                    </div>
                </div>

                <!-- Sales table -->
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Invoice ID</th>
                                <th>Client Name</th>
                                <th>Billing Date</th>
                                <th>Grand Total</th>
                                <th>Dispatch Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="sales-table-body">
                            <!-- Populated dynamically by sales.js -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Create Sales Invoice Modal -->
    <div class="modal" id="invoice-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Book Customer Quotation / Invoice</h3>
                <button class="modal-close-btn" id="close-invoice-modal">&times;</button>
            </div>
            <form id="invoice-form">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Select Customer Account *</label>
                        <select class="form-control" id="inv-customer-select" required>
                            <!-- Populated dynamically -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Select Product Item *</label>
                        <select class="form-control" id="inv-item-select" required>
                            <!-- Populated dynamically -->
                        </select>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Unit List Price ($)</label>
                            <input type="text" class="form-control" id="inv-item-price" readonly placeholder="Auto-calculated">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Billing Quantity *</label>
                            <input type="number" class="form-control" id="inv-qty" min="1" value="1" required>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Direct Discount ($)</label>
                            <input type="number" step="0.01" class="form-control" id="inv-discount" value="0.00">
                        </div>
                        <div class="form-group">
                            <label class="form-label">VAT Tax Rate</label>
                            <input type="text" class="form-control" value="15% (Default)" readonly>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancel-invoice-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Book & Invoice Order</button>
                </div>
            </form>
        </div>
    </div>

    <!-- AI Chat placeholder -->
    <div id="ai-chat-placeholder"></div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/sales.js"></script>
</body>
</html>
