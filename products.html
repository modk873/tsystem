<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — ProFix ERP</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"><div class="sidebar-brand"><span>ProFix ERP</span></div>
      <ul class="nav-menu">
        <li><a href="dashboard.html"><span class="nav-label">Dashboard</span></a></li>
        <li><a href="products.html" class="active"><span class="nav-label">Products</span></a></li>
        <li><a href="customers.html"><span class="nav-label">Customers</span></a></li>
        <li><a href="suppliers.html"><span class="nav-label">Suppliers</span></a></li>
        <li><a href="warehouse.html"><span class="nav-label">Warehouse</span></a></li>
        <li><a href="sales.html"><span class="nav-label">Sales</span></a></li>
        <li><a href="purchases.html"><span class="nav-label">Purchases</span></a></li>
        <li><a href="maintenance.html"><span class="nav-label">Maintenance</span></a></li>
        <li><a href="reports.html"><span class="nav-label">Reports</span></a></li>
        <li><a href="settings.html"><span class="nav-label">Settings</span></a></li>
      </ul>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="main-content">
      <nav class="navbar">
        <button class="navbar-toggle" id="sidebarToggle">☰</button>
        <div class="navbar-search"><input type="text" id="globalSearch" placeholder="Search..."></div>
        <div class="navbar-actions">
          <button class="icon-btn" id="themeToggle">🌓</button>
          <div class="navbar-user"><div class="user-avatar" id="userAvatar">A</div><span id="userName">Admin</span></div>
          <a href="#" id="logoutBtn" class="btn btn-sm btn-secondary">Logout</a>
        </div>
      </nav>
      <div class="page-content">
        <div class="page-header">
          <div><h1>Products</h1><p><span id="totalCount">0</span> products total</p></div>
          <button class="btn btn-primary" id="addProductBtn">+ Add Product</button>
        </div>
        <div class="filters-bar">
          <input type="text" class="form-control search-input" id="searchInput" placeholder="Search name, SKU, barcode...">
          <select class="form-control" id="filterCategory"></select>
          <select class="form-control" id="filterStatus"><option value="">All Status</option><option>Active</option><option>Low Stock</option></select>
        </div>
        <div class="card"><div class="card-body table-wrap">
          <table><thead><tr>
            <th>Image</th><th onclick="Products.sort('name')">Name</th><th onclick="Products.sort('sku')">SKU</th><th>Barcode</th>
            <th onclick="Products.sort('category')">Category</th><th>Brand</th><th onclick="Products.sort('qty')">Qty</th>
            <th>Cost</th><th onclick="Products.sort('price')">Price</th><th>Warranty</th><th>Status</th><th>Actions</th>
          </tr></thead><tbody id="productsBody"></tbody></table>
        </div><div class="pagination" id="pagination"></div></div>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="productModal">
    <div class="modal"><div class="modal-header"><span id="modalTitle">Add Product</span><button data-close-modal class="icon-btn">✕</button></div>
      <form id="productForm"><div class="modal-body">
        <div class="form-row"><div class="form-group"><label>Name</label><input name="name" class="form-control" required></div><div class="form-group"><label>SKU</label><input name="sku" class="form-control" required></div></div>
        <div class="form-row"><div class="form-group"><label>Barcode</label><input name="barcode" class="form-control" required></div><div class="form-group"><label>Category</label><select name="category" id="pCategory" class="form-control" required></select></div></div>
        <div class="form-row"><div class="form-group"><label>Brand</label><input name="brand" class="form-control" required></div><div class="form-group"><label>Quantity</label><input name="qty" type="number" class="form-control" required></div></div>
        <div class="form-row"><div class="form-group"><label>Cost</label><input name="cost" type="number" step="0.01" class="form-control" required></div><div class="form-group"><label>Price</label><input name="price" type="number" step="0.01" class="form-control" required></div></div>
        <div class="form-row"><div class="form-group"><label>Warranty</label><input name="warranty" class="form-control"></div><div class="form-group"><label>Status</label><select name="status" class="form-control"><option>Active</option><option>Low Stock</option></select></div></div>
        <div class="form-group"><label>Warehouse</label><select name="warehouseId" class="form-control"><option value="1">Main Warehouse</option><option value="2">North Branch</option></select></div>
      </div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-close-modal>Cancel</button><button type="submit" class="btn btn-primary">Save</button></div></form>
    </div>
  </div>
  <script src="js/app.js"></script><script src="js/products.js"></script>
  <script>document.querySelectorAll('.nav-menu a').forEach((a,i)=>{a.insertAdjacentHTML('afterbegin',[Icons.dashboard,Icons.products,Icons.customers,Icons.suppliers,Icons.warehouse,Icons.sales,Icons.purchases,Icons.maintenance,Icons.reports,Icons.settings][i]);});document.querySelector('.sidebar-brand').insertAdjacentHTML('afterbegin',Icons.logo);</script>
</body></html>
