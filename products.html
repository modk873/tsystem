<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Catalog - ProFix ERP</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Workspace -->
        <div class="main-wrapper">
            <!-- Topbar placeholder -->
            <div id="topbar-placeholder"></div>

            <!-- Products Catalog Page -->
            <main class="content-body">
                <div class="page-header">
                    <div class="page-title-group">
                        <h2 class="page-title">Products Inventory</h2>
                        <span class="page-subtitle">Manage, adjust and audit stock items catalog</span>
                    </div>
                    <div class="page-actions">
                        <button class="btn btn-primary" id="add-product-btn">
                            + Add New Product
                        </button>
                        <button class="btn btn-secondary" onclick="ProFixERP.showToast('Exporting catalog to CSV file...', 'info')">
                            Export CSV
                        </button>
                    </div>
                </div>

                <!-- Filters Panel -->
                <div class="filters-panel">
                    <div class="search-input-group">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="product-search-input" placeholder="Search by name, SKU or barcode...">
                    </div>
                    
                    <div class="filter-group">
                        <select class="filter-select" id="filter-category">
                            <!-- Populated dynamically -->
                        </select>
                        
                        <select class="filter-select" id="filter-brand">
                            <!-- Populated dynamically -->
                        </select>
                        
                        <select class="filter-select" id="filter-status">
                            <option value="all">All Statuses</option>
                            <option value="instock">In Stock</option>
                            <option value="lowstock">Low Stock</option>
                            <option value="outstock">Out of Stock</option>
                        </select>

                        <select class="filter-select" id="sort-products">
                            <option value="name">Sort: Name (A-Z)</option>
                            <option value="price-asc">Sort: Price (Low to High)</option>
                            <option value="price-desc">Sort: Price (High to Low)</option>
                            <option value="stock-asc">Sort: Stock (Low to High)</option>
                            <option value="stock-desc">Sort: Stock (High to Low)</option>
                        </select>
                    </div>
                </div>

                <!-- Products Table -->
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Product Details</th>
                                <th>Category</th>
                                <th>Brand</th>
                                <th>Stock Quantity</th>
                                <th>Unit Cost</th>
                                <th>Unit Price</th>
                                <th>Warranty</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="product-table-body">
                            <!-- Populated dynamically by products.js -->
                        </tbody>
                    </table>

                    <!-- Empty state -->
                    <div class="empty-state" id="product-empty-state" style="display:none;">
                        <svg class="empty-state-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                        <h4 class="empty-state-title">No Products Found</h4>
                        <p class="empty-state-desc">Try loosening your search terms or filters to locate catalog entries.</p>
                    </div>

                    <!-- Pagination -->
                    <div class="pagination">
                        <span class="pagination-info" id="page-info-text">Showing 0 to 0 of 0 entries</span>
                        <div class="pagination-controls">
                            <button class="page-btn" id="prev-page-btn" onclick="changePage('prev')">Prev</button>
                            <button class="page-btn" id="next-page-btn" onclick="changePage('next')">Next</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Product Form Modal -->
    <div class="modal" id="product-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-action-title">Add New Product</h3>
                <button class="modal-close-btn" id="close-product-modal">&times;</button>
            </div>
            <form id="product-form">
                <div class="modal-body">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="prod-name" required placeholder="e.g. Cordless Hammer Drill 20V">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">SKU *</label>
                            <input type="text" class="form-control" id="prod-sku" required placeholder="e.g. TL-CHD-20V">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Barcode *</label>
                            <input type="text" class="form-control" id="prod-barcode" required placeholder="e.g. 890123456789">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Category *</label>
                            <select class="form-control" id="prod-category" required>
                                <option value="Workshop Equipment">Workshop Equipment</option>
                                <option value="Gold Workshop Equipment">Gold Workshop Equipment</option>
                                <option value="Electrical Equipment">Electrical Equipment</option>
                                <option value="Construction Equipment">Construction Equipment</option>
                                <option value="Spare Parts">Spare Parts</option>
                                <option value="Maintenance Supplies">Maintenance Supplies</option>
                                <option value="Safety Equipment">Safety Equipment</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Brand *</label>
                            <input type="text" class="form-control" id="prod-brand" required placeholder="e.g. Makita">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Opening Stock Quantity *</label>
                            <input type="number" class="form-control" id="prod-qty" min="0" required placeholder="e.g. 10">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Warranty Details</label>
                            <input type="text" class="form-control" id="prod-warranty" placeholder="e.g. 12 Months">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Unit Cost ($) *</label>
                            <input type="number" step="0.01" class="form-control" id="prod-cost" required placeholder="e.g. 45.00">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Unit Retail Price ($) *</label>
                            <input type="number" step="0.01" class="form-control" id="prod-price" required placeholder="e.g. 75.00">
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">Serial Number (If applicable)</label>
                            <input type="text" class="form-control" id="prod-serial" placeholder="e.g. SN-HD-8902B">
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">Product Description</label>
                            <textarea class="form-control" id="prod-desc" placeholder="Enter specifications or details..."></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancel-product-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- AI Chat placeholder -->
    <div id="ai-chat-placeholder"></div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
