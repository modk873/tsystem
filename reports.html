<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — ProFix ERP</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"><div class="sidebar-brand"><span>ProFix ERP</span></div>
      <ul class="nav-menu">
        <li><a href="dashboard.html"><span class="nav-label">Dashboard</span></a></li>
        <li><a href="products.html"><span class="nav-label">Products</span></a></li>
        <li><a href="customers.html"><span class="nav-label">Customers</span></a></li>
        <li><a href="suppliers.html"><span class="nav-label">Suppliers</span></a></li>
        <li><a href="warehouse.html"><span class="nav-label">Warehouse</span></a></li>
        <li><a href="sales.html"><span class="nav-label">Sales</span></a></li>
        <li><a href="purchases.html"><span class="nav-label">Purchases</span></a></li>
        <li><a href="maintenance.html"><span class="nav-label">Maintenance</span></a></li>
        <li><a href="reports.html" class="active"><span class="nav-label">Reports</span></a></li>
        <li><a href="settings.html"><span class="nav-label">Settings</span></a></li>
      </ul>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="main-content">
      <nav class="navbar">
        <button class="navbar-toggle" id="sidebarToggle">☰</button>
        <div class="navbar-search"><input type="text" id="globalSearch" placeholder="Search..."></div>
        <div class="navbar-actions"><button class="icon-btn" id="themeToggle">🌓</button><div class="navbar-user"><div class="user-avatar" id="userAvatar">A</div><span id="userName">Admin</span></div><a href="#" id="logoutBtn" class="btn btn-sm btn-secondary">Logout</a></div>
      </nav>
      <div class="page-content">
        <div class="page-header"><div><h1>Reports</h1><p>Sales, inventory & financial reports</p></div>
          <select class="form-control" id="reportFilter" style="width:auto"><option value="all">All Time</option><option value="month">This Month</option><option value="quarter">This Quarter</option></select>
        </div>
        <div class="stats-grid" id="reportStats"></div>
        <div class="charts-row">
          <div class="card"><div class="card-header">Sales Report</div><div class="card-body"><div class="chart-container"><canvas id="reportSalesChart"></canvas></div></div></div>
          <div class="card"><div class="card-header">Inventory Report</div><div class="card-body"><div class="chart-container"><canvas id="reportInventoryChart"></canvas></div></div></div>
        </div>
        <div class="card"><div class="card-header">Financial Transactions</div><div class="card-body table-wrap">
          <table><thead><tr><th>Reference</th><th>Type</th><th>Party</th><th>Amount</th><th>Date</th></tr></thead><tbody id="reportTableBody"></tbody></table>
        </div></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script><script src="js/charts.js"></script><script src="js/sales.js"></script>
  <script>document.querySelectorAll('.nav-menu a').forEach((a,i)=>{a.insertAdjacentHTML('afterbegin',[Icons.dashboard,Icons.products,Icons.customers,Icons.suppliers,Icons.warehouse,Icons.sales,Icons.purchases,Icons.maintenance,Icons.reports,Icons.settings][i]);});document.querySelector('.sidebar-brand').insertAdjacentHTML('afterbegin',Icons.logo);</script>
</body></html>
