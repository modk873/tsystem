<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — ProFix ERP</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"><div class="sidebar-brand"><span>ProFix ERP</span></div>
      <ul class="nav-menu">
        <li><a href="dashboard.html"><span class="nav-label">Dashboard</span></a></li>
        <li><a href="products.html"><span class="nav-label">Products</span></a></li>
        <li><a href="customers.html"><span class="nav-label">Customers</span></a></li>
        <li><a href="suppliers.html"><span class="nav-label">Suppliers</span></a></li>
        <li><a href="warehouse.html"><span class="nav-label">Warehouse</span></a></li>
        <li><a href="sales.html"><span class="nav-label">Sales</span></a></li>
        <li><a href="purchases.html"><span class="nav-label">Purchases</span></a></li>
        <li><a href="maintenance.html"><span class="nav-label">Maintenance</span></a></li>
        <li><a href="reports.html"><span class="nav-label">Reports</span></a></li>
        <li><a href="settings.html" class="active"><span class="nav-label">Settings</span></a></li>
      </ul>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="main-content">
      <nav class="navbar">
        <button class="navbar-toggle" id="sidebarToggle">☰</button>
        <div class="navbar-search"><input type="text" id="globalSearch" placeholder="Search..."></div>
        <div class="navbar-actions"><button class="icon-btn" id="themeToggle">🌓</button><div class="navbar-user"><div class="user-avatar" id="userAvatar">A</div><span id="userName">Admin</span></div><a href="#" id="logoutBtn" class="btn btn-sm btn-secondary">Logout</a></div>
      </nav>
      <div class="page-content">
        <div class="page-header"><div><h1>Settings</h1><p>Configure your ERP system</p></div></div>
        <div class="tabs">
          <button class="tab-btn active" data-tab="tabCompany">Company</button>
          <button class="tab-btn" data-tab="tabProfile">Profile</button>
          <button class="tab-btn" data-tab="tabTheme">Appearance</button>
        </div>
        <div class="tab-panel active" id="tabCompany">
          <div class="card"><div class="card-body">
            <form id="companyForm">
              <div class="form-group"><label>Company Name</label><input name="name" class="form-control" required></div>
              <div class="form-row"><div class="form-group"><label>Email</label><input name="email" type="email" class="form-control"></div><div class="form-group"><label>Phone</label><input name="phone" class="form-control"></div></div>
              <div class="form-group"><label>Address</label><input name="address" class="form-control"></div>
              <div class="form-group"><label>Tax Registration</label><input name="tax" class="form-control"></div>
              <button type="submit" class="btn btn-primary">Save Company Info</button>
            </form>
          </div></div>
        </div>
        <div class="tab-panel" id="tabProfile">
          <div class="card"><div class="card-body">
            <form id="profileForm">
              <div class="form-row"><div class="form-group"><label>Full Name</label><input name="name" class="form-control" required></div><div class="form-group"><label>Role</label><input name="role" class="form-control" readonly></div></div>
              <div class="form-row"><div class="form-group"><label>Email</label><input name="email" type="email" class="form-control" readonly></div><div class="form-group"><label>Phone</label><input name="phone" class="form-control"></div></div>
              <button type="submit" class="btn btn-primary">Update Profile</button>
            </form>
          </div></div>
        </div>
        <div class="tab-panel" id="tabTheme">
          <div class="card"><div class="card-body">
            <div class="form-group"><label>Theme</label><select id="themeSelect" class="form-control"><option value="light">Light Mode</option><option value="dark">Dark Mode</option></select></div>
            <div class="form-group"><label>Language</label><select id="languageSelect" class="form-control"><option value="en">English</option><option value="ar">Arabic</option></select></div>
          </div></div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script><script src="js/sales.js"></script>
  <script>document.querySelectorAll('.nav-menu a').forEach((a,i)=>{a.insertAdjacentHTML('afterbegin',[Icons.dashboard,Icons.products,Icons.customers,Icons.suppliers,Icons.warehouse,Icons.sales,Icons.purchases,Icons.maintenance,Icons.reports,Icons.settings][i]);});document.querySelector('.sidebar-brand').insertAdjacentHTML('afterbegin',Icons.logo);</script>
</body></html>
