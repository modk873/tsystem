<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers Directory - ProFix ERP</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Workspace -->
        <div class="main-wrapper">
            <!-- Topbar placeholder -->
            <div id="topbar-placeholder"></div>

            <!-- Suppliers Directory Page -->
            <main class="content-body">
                <div class="page-header">
                    <div class="page-title-group">
                        <h2 class="page-title">Suppliers Directory</h2>
                        <span class="page-subtitle">Manage supply chains, materials contracts, and performance ratings</span>
                    </div>
                    <div class="page-actions">
                        <button class="btn btn-primary" id="add-supplier-btn">
                            + Add New Supplier
                        </button>
                        <button class="btn btn-secondary" onclick="ProFixERP.showToast('Exporting supplier registry...', 'info')">
                            Export
                        </button>
                    </div>
                </div>

                <!-- Filters Panel -->
                <div class="filters-panel">
                    <div class="search-input-group">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="supplier-search-input" placeholder="Search by name, category, or representative...">
                    </div>
                    
                    <div class="filter-group">
                        <select class="filter-select" id="sort-suppliers">
                            <option value="name">Sort: Name (A-Z)</option>
                            <option value="rating-desc">Sort: Rating (High to Low)</option>
                        </select>
                    </div>
                </div>

                <!-- Suppliers Table -->
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Supplier Name</th>
                                <th>Representative</th>
                                <th>Communications</th>
                                <th>Supply Category</th>
                                <th>Quality Rating</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="supplier-table-body">
                            <!-- Populated dynamically by customers.js -->
                        </tbody>
                    </table>

                    <!-- Pagination -->
                    <div class="pagination">
                        <span class="pagination-info" id="supplier-page-info">Showing 0 to 0 of 0 entries</span>
                        <div class="pagination-controls">
                            <button class="page-btn" id="supp-prev-btn" onclick="changeSupplierPage('prev')">Prev</button>
                            <button class="page-btn" id="supp-next-btn" onclick="changeSupplierPage('next')">Next</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Supplier Form Modal -->
    <div class="modal" id="supplier-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-action-title">Add New Supplier</h3>
                <button class="modal-close-btn" id="close-supplier-modal">&times;</button>
            </div>
            <form id="supplier-form">
                <div class="modal-body">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label class="form-label">Supplier Corporate Name *</label>
                            <input type="text" class="form-control" id="supp-name" required placeholder="e.g. Nippon Steel Machinery">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Representative Contact *</label>
                            <input type="text" class="form-control" id="supp-contact" required placeholder="e.g. Kenji Sato">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Email Address *</label>
                            <input type="email" class="form-control" id="supp-email" required placeholder="e.g. export@nipponsteel.co.jp">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Phone Line *</label>
                            <input type="text" class="form-control" id="supp-phone" required placeholder="e.g. +81 (3) 0122">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Supply Category *</label>
                            <select class="form-control" id="supp-category" required>
                                <option value="Workshop Equipment">Workshop Equipment</option>
                                <option value="Gold Workshop Equipment">Gold Workshop Equipment</option>
                                <option value="Electrical Equipment">Electrical Equipment</option>
                                <option value="Construction Equipment">Construction Equipment</option>
                                <option value="Spare Parts">Spare Parts</option>
                                <option value="Maintenance Supplies">Maintenance Supplies</option>
                                <option value="Safety Equipment">Safety Equipment</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Performance Rating (1.0 to 5.0) *</label>
                            <input type="number" step="0.1" min="1" max="5" class="form-control" id="supp-rating" value="5.0" required>
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">Supplier HQ/Logistics Address *</label>
                            <textarea class="form-control" id="supp-address" required placeholder="Enter supplier address details..."></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancel-supplier-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Supplier</button>
                </div>
            </form>
        </div>
    </div>

    <!-- AI Chat placeholder -->
    <div id="ai-chat-placeholder"></div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/customers.js"></script>
</body>
</html>
