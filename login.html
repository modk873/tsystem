<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ProFix ERP</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <svg width="48" height="48" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#1e5aa8"/><path d="M8 22V10l8-4 8 4v12l-8 4-8-4z" stroke="#fff" stroke-width="2" fill="none"/></svg>
        <h1>ProFix Industrial Supplies</h1>
        <p>Enterprise Resource Planning</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" id="email" value="admin@profix.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-control" id="password" value="admin123" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;padding:12px">Sign In</button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:.8rem;color:var(--text-muted)">Demo: admin@profix.com / admin123</p>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (App.login(email, password)) location.href = 'dashboard.html';
      else App.notify('Invalid credentials', 'error');
    });
  </script>
</body>
</html>
