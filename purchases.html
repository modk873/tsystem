<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Orders - ProFix ERP</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Workspace -->
        <div class="main-wrapper">
            <!-- Topbar placeholder -->
            <div id="topbar-placeholder"></div>

            <!-- Purchases Page -->
            <main class="content-body">
                <div class="page-header">
                    <div class="page-title-group">
                        <h2 class="page-title">Purchase Orders (Procurement)</h2>
                        <span class="page-subtitle">Draft POs, monitor supply rates, and approve receiving slips</span>
                    </div>
                    <div class="page-actions">
                        <button class="btn btn-primary" id="create-po-btn">
                            + Create Purchase Order
                        </button>
                    </div>
                </div>

                <!-- Purchases table -->
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>PO Number</th>
                                <th>Supplier Name</th>
                                <th>Ordering Date</th>
                                <th>Total Cost</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="purchases-table-body">
                            <!-- Populated dynamically by sales.js -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Create Purchase Order Modal -->
    <div class="modal" id="po-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Create Purchase Order (PO)</h3>
                <button class="modal-close-btn" id="close-po-modal">&times;</button>
            </div>
            <form id="po-form">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Select Supply Partner *</label>
                        <select class="form-control" id="po-supplier-select" required>
                            <!-- Populated dynamically -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Select Product Item *</label>
                        <select class="form-control" id="po-item-select" required>
                            <!-- Populated dynamically -->
                        </select>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Unit Supply Cost ($)</label>
                            <input type="text" class="form-control" id="po-item-cost" readonly placeholder="Auto-calculated">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Order Quantity *</label>
                            <input type="number" class="form-control" id="po-qty" min="1" value="1" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancel-po-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Submit Purchase Order</button>
                </div>
            </form>
        </div>
    </div>

    <!-- AI Chat placeholder -->
    <div id="ai-chat-placeholder"></div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/sales.js"></script>
</body>
</html>
