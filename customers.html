<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers Directory - ProFix ERP</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Workspace -->
        <div class="main-wrapper">
            <!-- Topbar placeholder -->
            <div id="topbar-placeholder"></div>

            <!-- Customers Directory Page -->
            <main class="content-body">
                <div class="page-header">
                    <div class="page-title-group">
                        <h2 class="page-title">Customers Directory</h2>
                        <span class="page-subtitle">View profile indexes, ledger balances, and purchase logs</span>
                    </div>
                    <div class="page-actions">
                        <button class="btn btn-primary" id="add-customer-btn">
                            + Add New Customer
                        </button>
                        <button class="btn btn-secondary" onclick="ProFixERP.showToast('Exporting customer data...', 'info')">
                            Export
                        </button>
                    </div>
                </div>

                <!-- Filters Panel -->
                <div class="filters-panel">
                    <div class="search-input-group">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="customer-search-input" placeholder="Search by name, contact, or email...">
                    </div>
                    
                    <div class="filter-group">
                        <select class="filter-select" id="sort-customers">
                            <option value="name">Sort: Name (A-Z)</option>
                            <option value="balance-desc">Sort: Outstanding Balance (High to Low)</option>
                            <option value="purchases-desc">Sort: Purchase Count (High to Low)</option>
                        </select>
                    </div>
                </div>

                <!-- Customers Table -->
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Client Name</th>
                                <th>Contact Representative</th>
                                <th>Communications</th>
                                <th>Delivery Address</th>
                                <th>Outstanding Balance</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="customer-table-body">
                            <!-- Populated dynamically by customers.js -->
                        </tbody>
                    </table>

                    <!-- Pagination -->
                    <div class="pagination">
                        <span class="pagination-info" id="customer-page-info">Showing 0 to 0 of 0 entries</span>
                        <div class="pagination-controls">
                            <button class="page-btn" id="cust-prev-btn" onclick="changeCustomerPage('prev')">Prev</button>
                            <button class="page-btn" id="cust-next-btn" onclick="changeCustomerPage('next')">Next</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Customer Form Modal -->
    <div class="modal" id="customer-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-action-title">Add New Customer</h3>
                <button class="modal-close-btn" id="close-customer-modal">&times;</button>
            </div>
            <form id="customer-form">
                <div class="modal-body">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label class="form-label">Company Name *</label>
                            <input type="text" class="form-control" id="cust-name" required placeholder="e.g. Acme Tooling Industrial">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Contact Representative *</label>
                            <input type="text" class="form-control" id="cust-contact" required placeholder="e.g. John Doe">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Email Address *</label>
                            <input type="email" class="form-control" id="cust-email" required placeholder="e.g. procurement@acme.com">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Phone Line *</label>
                            <input type="text" class="form-control" id="cust-phone" required placeholder="e.g. +1 (555) 0192">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Opening Account Balance ($)</label>
                            <input type="number" step="0.01" class="form-control" id="cust-balance" value="0.00" placeholder="e.g. 1500.00">
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">Billing/Delivery Address *</label>
                            <textarea class="form-control" id="cust-address" required placeholder="Enter delivery location..."></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancel-customer-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Profile</button>
                </div>
            </form>
        </div>
    </div>

    <!-- AI Chat placeholder -->
    <div id="ai-chat-placeholder"></div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/customers.js"></script>
</body>
</html>
