<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProFix Industrial Supplies ERP - Redirecting...</title>
    <script>
        // Simple router redirect
        document.addEventListener('DOMContentLoaded', () => {
            const auth = sessionStorage.getItem('proFix_auth_user');
            if (auth) {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</head>
<body style="background:#0f172a; color:#cbd5e1; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0;">
    <div style="text-align:center;">
        <h2 style="margin-bottom:8px;">ProFix ERP Loading</h2>
        <div style="width:40px; height:40px; border:4px solid #38bdf8; border-top-color:transparent; border-radius:50%; margin:16px auto; animation: spin 1s linear infinite;"></div>
    </div>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>
</html>
