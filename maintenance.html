<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance — ProFix ERP</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"><div class="sidebar-brand"><span>ProFix ERP</span></div>
      <ul class="nav-menu">
        <li><a href="dashboard.html"><span class="nav-label">Dashboard</span></a></li>
        <li><a href="products.html"><span class="nav-label">Products</span></a></li>
        <li><a href="customers.html"><span class="nav-label">Customers</span></a></li>
        <li><a href="suppliers.html"><span class="nav-label">Suppliers</span></a></li>
        <li><a href="warehouse.html"><span class="nav-label">Warehouse</span></a></li>
        <li><a href="sales.html"><span class="nav-label">Sales</span></a></li>
        <li><a href="purchases.html"><span class="nav-label">Purchases</span></a></li>
        <li><a href="maintenance.html" class="active"><span class="nav-label">Maintenance</span></a></li>
        <li><a href="reports.html"><span class="nav-label">Reports</span></a></li>
        <li><a href="settings.html"><span class="nav-label">Settings</span></a></li>
      </ul>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="main-content">
      <nav class="navbar">
        <button class="navbar-toggle" id="sidebarToggle">☰</button>
        <div class="navbar-search"><input type="text" id="globalSearch" placeholder="Search..."></div>
        <div class="navbar-actions"><button class="icon-btn" id="themeToggle">🌓</button><div class="navbar-user"><div class="user-avatar" id="userAvatar">A</div><span id="userName">Admin</span></div><a href="#" id="logoutBtn" class="btn btn-sm btn-secondary">Logout</a></div>
      </nav>
      <div class="page-content">
        <div class="page-header"><div><h1>Maintenance & Repairs</h1><p>Equipment repair requests</p></div><button class="btn btn-primary" id="addMaintBtn">+ New Request</button></div>
        <div class="card"><div class="card-body table-wrap">
          <table><thead><tr><th>Request No</th><th>Equipment</th><th>Customer</th><th>Technician</th><th>Priority</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody id="maintBody"></tbody></table>
        </div><div class="pagination" id="pagination"></div></div>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="maintModal"><div class="modal"><div class="modal-header"><span id="modalTitle">New Repair Request</span><button data-close-modal class="icon-btn">✕</button></div>
    <form id="maintForm"><div class="modal-body">
      <div class="form-group"><label>Equipment</label><input name="equipment" class="form-control" required placeholder="e.g. Gold Melting Furnace GW-004"></div>
      <div class="form-row"><div class="form-group"><label>Customer</label><select name="customerId" id="maintCustomer" class="form-control" required></select></div><div class="form-group"><label>Technician</label><input name="technician" class="form-control" required></div></div>
      <div class="form-row"><div class="form-group"><label>Priority</label><select name="priority" class="form-control"><option>Low</option><option>Medium</option><option>High</option></select></div><div class="form-group"><label>Status</label><select name="status" class="form-control"><option>Open</option><option>In Progress</option><option>Done</option></select></div></div>
      <div class="form-group"><label>Description</label><textarea name="description" class="form-control" rows="3" required></textarea></div>
    </div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-close-modal>Cancel</button><button type="submit" class="btn btn-primary">Save</button></div></form></div></div>
  <script src="js/app.js"></script><script src="js/sales.js"></script>
  <script>document.querySelectorAll('.nav-menu a').forEach((a,i)=>{a.insertAdjacentHTML('afterbegin',[Icons.dashboard,Icons.products,Icons.customers,Icons.suppliers,Icons.warehouse,Icons.sales,Icons.purchases,Icons.maintenance,Icons.reports,Icons.settings][i]);});document.querySelector('.sidebar-brand').insertAdjacentHTML('afterbegin',Icons.logo);</script>
</body></html>
