<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance & Repairs - ProFix ERP</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Workspace -->
        <div class="main-wrapper">
            <!-- Topbar placeholder -->
            <div id="topbar-placeholder"></div>

            <!-- Maintenance & Repair Page -->
            <main class="content-body">
                <div class="page-header">
                    <div class="page-title-group">
                        <h2 class="page-title">Equipment Maintenance & Repairs</h2>
                        <span class="page-subtitle">Track customer equipment service requests, assign technicians, and log spare parts used</span>
                    </div>
                    <div class="page-actions">
                        <button class="btn btn-primary" onclick="openRepairModal()">
                            + Book Repair Request
                        </button>
                    </div>
                </div>

                <!-- Repairs Table -->
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Req ID</th>
                                <th>Equipment Item</th>
                                <th>Customer Account</th>
                                <th>Urgency</th>
                                <th>Assigned Technician</th>
                                <th>Booking Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="maintenance-table-body">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Book Repair Request Modal -->
    <div class="modal" id="repair-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Book Service Repair Request</h3>
                <button class="modal-close-btn" onclick="closeRepairModal()">&times;</button>
            </div>
            <form id="repair-form" onsubmit="handleRepairSubmit(event)">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Client Account *</label>
                        <select class="form-control" id="rep-customer" required>
                            <!-- Filled dynamically -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Equipment Model Name *</label>
                        <select class="form-control" id="rep-equipment" required>
                            <!-- Filled dynamically -->
                        </select>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Urgency Priority *</label>
                            <select class="form-control" id="rep-priority" required>
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                                <option value="Critical">Critical</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Assign Technician</label>
                            <select class="form-control" id="rep-technician">
                                <option value="Unassigned">Unassigned (Queue)</option>
                                <option value="Dave Miller (Lead)">Dave Miller (Lead)</option>
                                <option value="Alex Rivera (Tech)">Alex Rivera (Tech)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Fault / Diagnostic Description *</label>
                        <textarea class="form-control" id="rep-details" required placeholder="Describe details of the machinery error..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeRepairModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Book Request</button>
                </div>
            </form>
        </div>
    </div>

    <!-- AI Chat placeholder -->
    <div id="ai-chat-placeholder"></div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof ProFixERP !== 'undefined') {
                ProFixERP.enforcePagePermissions('maintenance');
            }
            renderRepairsList();
            populateRepairModalSelects();
        });

        function renderRepairsList() {
            const list = JSON.parse(localStorage.getItem('proFix_maintenance') || '[]');
            const tbody = document.getElementById('maintenance-table-body');
            if (!tbody) return;

            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center">No service orders pending</td></tr>`;
                return;
            }

            tbody.innerHTML = list.map(m => {
                let badgeClass = 'badge-neutral';
                if (m.status === 'Completed') badgeClass = 'badge-success';
                if (m.status === 'In Progress') badgeClass = 'badge-warning';
                if (m.status === 'Pending') badgeClass = 'badge-danger';

                let priorityClass = 'badge-neutral';
                if (m.priority === 'Critical') priorityClass = 'badge-danger';
                if (m.priority === 'High') priorityClass = 'badge-warning';
                if (m.priority === 'Medium') priorityClass = 'badge-info';

                return `
                    <tr>
                        <td style="font-weight:600">${m.reqId}</td>
                        <td>
                            <div style="font-weight:600; cursor:pointer;" onclick="viewRepairSpecs('${m.reqId}')">${m.equipment}</div>
                            <span style="font-size:0.75rem; color:var(--text-secondary)">Parts Used: ${m.partsUsed}</span>
                        </td>
                        <td>${m.customerName}</td>
                        <td><span class="badge ${priorityClass}">${m.priority}</span></td>
                        <td>${m.technician}</td>
                        <td>${m.requestDate}</td>
                        <td><span class="badge ${badgeClass}">${m.status}</span></td>
                        <td>
                            <div style="display:flex; gap:6px;">
                                ${m.status === 'Pending' ? `<button class="btn btn-primary btn-sm" onclick="startRepair('${m.reqId}')">Start Job</button>` : ''}
                                ${m.status === 'In Progress' ? `<button class="btn btn-success btn-sm" onclick="completeRepairModal('${m.reqId}')">Complete Job</button>` : ''}
                                <button class="btn btn-secondary btn-sm" onclick="viewRepairSpecs('${m.reqId}')">View Details</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function populateRepairModalSelects() {
            const customers = JSON.parse(localStorage.getItem('proFix_customers') || '[]');
            const products = JSON.parse(localStorage.getItem('proFix_products') || '[]');

            const custSelect = document.getElementById('rep-customer');
            const prodSelect = document.getElementById('rep-equipment');

            if (custSelect) {
                custSelect.innerHTML = `<option value="">Select Customer...</option>` +
                    customers.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            }
            if (prodSelect) {
                prodSelect.innerHTML = `<option value="">Select Machinery...</option>` +
                    products.map(p => `<option value="${p.name}">${p.name} (SKU: ${p.sku})</option>`).join('');
            }
        }

        function openRepairModal() {
            document.getElementById('repair-modal').classList.add('active');
            document.getElementById('repair-form').reset();
        }

        function closeRepairModal() {
            document.getElementById('repair-modal').classList.remove('active');
        }

        function handleRepairSubmit(e) {
            e.preventDefault();
            const customer = document.getElementById('rep-customer').value;
            const equipment = document.getElementById('rep-equipment').value;
            const priority = document.getElementById('rep-priority').value;
            const tech = document.getElementById('rep-technician').value;
            const details = document.getElementById('rep-details').value;

            if (!customer || !equipment) {
                alert("Please select customer and equipment!");
                return;
            }

            const list = JSON.parse(localStorage.getItem('proFix_maintenance') || '[]');
            const newReq = {
                reqId: "MNT-2026-0" + (list.length + 11).toString(),
                equipment: equipment,
                customerName: customer,
                technician: tech,
                priority: priority,
                status: tech === 'Unassigned' ? 'Pending' : 'In Progress',
                requestDate: new Date().toISOString().split('T')[0],
                details: details,
                partsUsed: "None"
            };

            list.push(newReq);
            localStorage.setItem('proFix_maintenance', JSON.stringify(list));

            if (typeof ProFixERP !== 'undefined') {
                ProFixERP.showToast(`Repair order ${newReq.reqId} created!`);
            }

            closeRepairModal();
            renderRepairsList();
        }

        window.startRepair = function(reqId) {
            const list = JSON.parse(localStorage.getItem('proFix_maintenance') || '[]');
            const idx = list.findIndex(r => r.reqId === reqId);
            if (idx !== -1) {
                list[idx].status = "In Progress";
                if (list[idx].technician === 'Unassigned') {
                    list[idx].technician = "Dave Miller (Lead)"; // auto assign default tech
                }
                localStorage.setItem('proFix_maintenance', JSON.stringify(list));
                if (typeof ProFixERP !== 'undefined') ProFixERP.showToast(`Repair job ${reqId} started.`);
                renderRepairsList();
            }
        };

        window.completeRepairModal = function(reqId) {
            const list = JSON.parse(localStorage.getItem('proFix_maintenance') || '[]');
            const req = list.find(r => r.reqId === reqId);
            if (!req) return;

            const sparePart = prompt("Enter spare parts consumed during repair (e.g. Spindle Chuck Gear) or leave blank if none:", "");
            if (sparePart === null) return; // user cancelled prompt

            const idx = list.findIndex(r => r.reqId === reqId);
            if (idx !== -1) {
                list[idx].status = "Completed";
                list[idx].partsUsed = sparePart.trim() !== "" ? sparePart.trim() : "None";
                localStorage.setItem('proFix_maintenance', JSON.stringify(list));
                if (typeof ProFixERP !== 'undefined') ProFixERP.showToast(`Service order ${reqId} finalized.`);
                renderRepairsList();
            }
        };

        window.viewRepairSpecs = function(reqId) {
            const list = JSON.parse(localStorage.getItem('proFix_maintenance') || '[]');
            const m = list.find(r => r.reqId === reqId);
            if (!m) return;

            const detailsModal = document.createElement('div');
            detailsModal.className = 'modal active';
            detailsModal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title">Repair Diagnostic Sheet: ${m.reqId}</h3>
                        <button class="modal-close-btn" onclick="this.closest('.modal').remove()">&times;</button>
                    </div>
                    <div class="modal-body" style="display:flex; flex-direction:column; gap:16px;">
                        <div>
                            <strong>Equipment Model:</strong>
                            <div style="font-size:1.1rem; font-weight:700; color:var(--primary-color)">${m.equipment}</div>
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                            <div>
                                <strong>Customer Account:</strong>
                                <div>${m.customerName}</div>
                            </div>
                            <div>
                                <strong>Date Registered:</strong>
                                <div>${m.requestDate}</div>
                            </div>
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                            <div>
                                <strong>Urgency Level:</strong>
                                <div><span class="badge badge-warning">${m.priority}</span></div>
                            </div>
                            <div>
                                <strong>Assigned Engineer:</strong>
                                <div>${m.technician}</div>
                            </div>
                        </div>
                        <div>
                            <strong>Repair Status:</strong>
                            <div><span class="badge badge-success">${m.status}</span></div>
                        </div>
                        <div>
                            <strong>Problem Details:</strong>
                            <p style="background:var(--bg-app); border:1px solid var(--border-color); padding:10px; border-radius:6px; font-size:0.85rem; line-height:1.4;">
                                ${m.details}
                            </p>
                        </div>
                        <div>
                            <strong>Materials & Spare Parts Utilized:</strong>
                            <div style="font-weight:600; color:var(--accent-warning);">${m.partsUsed}</div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" onclick="this.closest('.modal').remove()">Close</button>
                    </div>
                </div>
            `;
            document.body.appendChild(detailsModal);
        };
    </script>
</body>
</html>
